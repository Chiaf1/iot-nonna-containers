services:
  mqtt:
    image: eclipse-mosquitto:2.1.2-alpine
    ports:
      - 1883:1883
    restart: unless-stopped
    volumes:
      - ./configs/mosquitto:/mosquitto/config
      - mqtt-data:/mosquitto/data
      - mqtt-log:/mosquitto/log
  pg_db:
    image: postgres:18.2
    restart: unless-stopped
    ports:
      - 5432:5432
    env_file:
      - configs/postgres/.env
    volumes:
      - pgdata:/var/lib/postgresql
volumes:
  mqtt-data:
  mqtt-log:
  pgdata: